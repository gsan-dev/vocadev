version: '3.8'

services:
  discord-kuma-bot:
    build: .
    container_name: uptime-kuma-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Expone el puerto 8080 para que Uptime Kuma envíe las notificaciones al webhook
      # Formato: PUERTO_HOST:PUERTO_CONTENEDOR
      - "15830:${WEBHOOK_PORT:-15830}"
    # Opcional: configurar la franja horaria mediante variables
    environment:
      - TZ=Europe/Madrid
